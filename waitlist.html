<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Forge — Get ready for your trades test</title>
<meta name="description" content="Free practice for the IBEW/NJATC and GAN trades aptitude tests. Get early access.">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#15181b;--card:#1c2024;--border:#33383e;
  --yellow:#d4622a;--yellow-dark:#bc5222;
  --text:#eceae4;--text2:#a3a8ad;--text3:#6f7479;
  --green:#3ba86b;--red:#e2604f;
}
html,body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body{
  display:flex;flex-direction:column;align-items:center;padding:0 24px;
  background-image:
    linear-gradient(rgba(242,183,5,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(242,183,5,.05) 1px, transparent 1px);
  background-size:28px 28px;
}

.wrap{width:100%;max-width:420px;min-height:100vh;display:flex;flex-direction:column;}

/* Hazard stripe: the signature element */
.hazard-bar{
  height:14px;width:100%;
  background:repeating-linear-gradient(-45deg,var(--yellow) 0 18px,#1a1a1a 18px 36px);
  margin-top:28px;
}

.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 0 32px;}

.eyebrow{
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;color:var(--yellow);margin-bottom:14px;
  border:1px solid var(--yellow);padding:4px 12px;border-radius:2px;
}

.logo{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:64px;letter-spacing:0px;line-height:.92;margin-bottom:6px;}
.logo span{color:var(--yellow);}
.tagline{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-bottom:36px;}

.headline{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:36px;line-height:1.05;margin-bottom:14px;max-width:320px;text-transform:uppercase;}
.headline em{font-style:normal;color:var(--yellow);}
.subhead{font-size:15px;color:var(--text2);line-height:1.65;max-width:300px;margin-bottom:30px;}

.pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:32px;}
.pill{
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.4px;
  padding:6px 12px;border-radius:2px;background:var(--card);border:1px solid var(--border);color:var(--text2);
}

.form-block{width:100%;}
.form-row{display:flex;gap:8px;margin-bottom:10px;}
.email-input{
  flex:1;padding:16px;border-radius:4px;border:1px solid var(--border);background:var(--card);
  color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:15px;outline:none;min-width:0;
}
.email-input:focus{border-color:var(--yellow);}
.email-input::placeholder{color:var(--text3);}
.join-btn{
  padding:16px 22px;border-radius:4px;font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;background:var(--yellow);color:#fff;border:none;white-space:nowrap;transition:background .15s;
  text-transform:uppercase;letter-spacing:.5px;
}
.join-btn:hover{background:var(--yellow-dark);}
.join-btn:disabled{opacity:.5;cursor:default;}
.fine-print{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);text-align:center;}
.err-msg{font-size:13px;color:var(--red);text-align:center;margin-bottom:8px;display:none;}

.success-block{width:100%;text-align:center;display:none;}
.success-title{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:26px;text-transform:uppercase;margin-bottom:8px;}
.success-title span{color:var(--yellow);}
.success-sub{font-size:14px;color:var(--text2);line-height:1.6;}

.footer{padding:20px 0 28px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);}

@media(max-width:380px){ .headline{font-size:30px;} .logo{font-size:54px;} }
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="eyebrow">Free · Every trade</div>
    <div class="logo">F<span>O</span>RGE</div>
    <div class="tagline">Trades Aptitude Test Prep</div>

    <div class="headline">Free practice for the <em>IBEW/NJATC</em> and <em>GAN</em> aptitude tests</div>
    <div class="subhead">Get early access.</div>

    <div class="pills">
      <span class="pill">IBEW / NJATC</span>
      <span class="pill">GAN BATTERY</span>
      <span class="pill">ALL TRADES</span>
    </div>

    <div class="form-block" id="form-block">
      <div class="err-msg" id="err-msg"></div>
      <div class="form-row">
        <input class="email-input" id="email-input" type="email" placeholder="you@email.com" autocomplete="email">
        <button class="join-btn" id="join-btn" onclick="joinList()">Join</button>
      </div>
      <div class="fine-print">No spam. We'll email you when it's ready.</div>
    </div>

    <div class="success-block" id="success-block">
      <div class="success-title">You're <span>in</span>.</div>
      <div class="success-sub">We'll email you as soon as Forge is ready.</div>
    </div>
  </div>

  <div class="hazard-bar"></div>
  <div class="footer">Forge — Trades Aptitude Test Prep</div>
</div>

<script>
var SUPABASE_URL = "https://vdtbxzjuxckwuzzhrjga.supabase.co";
var SUPABASE_ANON_KEY = "sb_publishable_9gu5tAC9TRSfnlNeY5VThQ_y5w_lAUV";
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function isValidEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((e||'').trim());}
function getSource(){
  var params = new URLSearchParams(window.location.search);
  return params.get('src') || 'direct';
}

var busy=false;
async function joinList(){
  if(busy) return;
  var input=document.getElementById('email-input');
  var email=(input.value||'').trim().toLowerCase();
  var err=document.getElementById('err-msg');
  var btn=document.getElementById('join-btn');
  err.style.display='none';

  if(!isValidEmail(email)){
    err.textContent='Enter a valid email address.';
    err.style.display='block';
    return;
  }

  busy=true; btn.disabled=true; btn.textContent='...';
  try{
    var res = await sb.from('leads').insert({ email: email, source: getSource() });
    if(res.error){
      err.textContent = 'Something went wrong. Try again.';
      err.style.display='block';
      busy=false; btn.disabled=false; btn.textContent='Join';
      return;
    }
    document.getElementById('form-block').style.display='none';
    document.getElementById('success-block').style.display='block';
  }catch(e){
    err.textContent = 'Something went wrong. Try again.';
    err.style.display='block';
    busy=false; btn.disabled=false; btn.textContent='Join';
  }
}
document.getElementById('email-input').addEventListener('keydown',function(e){ if(e.key==='Enter') joinList(); });
</script>
</body>
</html>
